spring:
  datasource:
    url: jdbc:h2:file:./data/tableorder
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

app:
  jwt:
    secret: tableorder-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 57600000
  upload:
    path: ./uploads/images
